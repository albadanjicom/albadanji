<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지난 뉴스레터 - 알바단지</title>
  <meta name="description" content="알바단지 지난 뉴스레터 아카이브. 과거 좌담회, 설문조사 모집 정보를 확인하세요.">
  <meta name="keywords" content="알바단지, 알바, 좌담회, 시장조사, 설문조사, 인터뷰, 리뷰 알바, 꿀알바, 지난 알바">
  <link rel="canonical" href="https://www.albadanji.com/archive.html">
  <meta property="og:title" content="지난 뉴스레터 - 알바단지">
  <meta property="og:description" content="알바단지 지난 뉴스레터 아카이브. 과거 좌담회, 설문조사 모집 정보를 확인하세요.">
  <meta property="og:url" content="https://www.albadanji.com/archive.html">
  <meta property="og:image" content="https://www.albadanji.com/images/og-image.png">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var t = localStorage.getItem('mr_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span>알바단지</span>
        <div class="logo-tooltip" id="logo-tooltip">Loading weather...</div>
      </a>
      <nav class="header__nav">
        <a href="index.html" class="header__link">홈</a>
        <a href="archive.html" class="header__link active">지난 뉴스레터</a>
        <form class="subscribe-form nav-subscribe-form">
          <input type="email" class="nav-subscribe-input" placeholder="이메일 주소" required autocomplete="email">
          <button type="submit" class="header__cta">무료 구독하기</button>
        </form>
      </nav>
    </div>
  </header>

  <!-- Archive Page Hero -->
  <section class="hero" id="hero" style="padding-bottom: 2rem;">
    <div class="hero__glow hero__glow--1"></div>
    <div class="hero__glow hero__glow--2"></div>
    <div class="container hero__container">
      <div class="hero__content">
        <h1 class="hero__title" style="margin-bottom: 0.5rem;">알바단지 아카이브</h1>
        <p class="hero__subtitle">
          이전에 발송된 시장조사 모집 공고를 확인하세요
        </p>
      </div>
    </div>
  </section>

  <main class="container" style="margin-bottom: 4rem;">
    <ul class="archive-list" id="archive-list">
      <!-- Archive items will be generated by newsletter_builder.py -->
      <li class="archive-item glass-panel" id="archive-today" style="border-radius: var(--radius-lg); padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; transition: transform 0.2s ease;">
        <span class="archive-item__date" id="archive-today-date" style="font-size: 0.9rem; color: var(--text-accent); font-weight: 600;">Today</span>
        <a href="index.html" class="archive-item__title" style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; color: var(--text-primary); text-decoration: none;">오늘의 뉴스레터 바로가기 &rarr;</a>
      </li>
    </ul>
  </main>

  <!-- Footer -->
  <footer class="footer" id="footer">
    <div class="container">
      <p class="footer__text">&copy; 2026 Albadanji. All rights reserved.</p>
      <div class="footer__links">
        <a href="index.html" class="footer__link">홈</a>
        <a href="subscribe.html" class="footer__link">구독 하기</a>
        <a href="#" class="footer__link footer-unsubscribe-btn">구독 취소</a>
        <div class="theme-toggle" id="theme-toggle" title="테마 변경" role="button" tabindex="0">
          <div class="theme-toggle__icons">
            <span>&#9728;&#65039;</span>
            <span>&#127769;</span>
          </div>
          <div class="theme-toggle__thumb"></div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-container glass-panel">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content-area">
        <!-- Content will be injected by app.js -->
      </div>
    </div>
  </div>

  <script src="js/archives-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const listEl = document.getElementById('archive-list');
      if (!listEl) return;
      
      if (typeof archiveDates === 'undefined' || archiveDates.length === 0) {
        listEl.innerHTML = '<li class="archive-item glass-panel" style="border-radius: var(--radius-lg); padding: 1.5rem; text-align: center;"><p style="color: var(--text-muted);">아직 발송된 뉴스레터가 없습니다.</p></li>';
        return;
      }
      
      listEl.innerHTML = archiveDates.map((dateStr, index) => {
        const parts = dateStr.split('-');
        const formatted = `${parts[0]}년 ${parts[1]}월 ${parts[2]}일 발송본`;
        const isLatest = index === 0;
        
        let contentHtml = `<span class="archive-item__date" style="font-size: 1.1rem; color: var(--text-primary); font-weight: 700;">${formatted}</span>`;
        
        if (isLatest) {
          contentHtml += `<span style="font-family: var(--font-heading); font-size: 1rem; font-weight: 700; color: var(--text-accent); margin-top: 0.5rem; display: block;">오늘의 뉴스레터 바로가기 &rarr;</span>`;
        }
        
        return `
        <li style="list-style: none;">
          <a href="archives/${dateStr}.html" style="text-decoration: none; display: block;">
            <div class="archive-item glass-panel" style="border-radius: var(--radius-lg); padding: 1.5rem; display: flex; flex-direction: column; margin-bottom: 1rem; transition: transform 0.2s ease; border: 1px solid var(--border-light); background: rgba(255,255,255,0.8);">
              ${contentHtml}
            </div>
          </a>
        </li>
        `;
      }).join('');
    });
  </script>
</body>
</html>
