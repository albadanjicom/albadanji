  <!-- Header -->

        <form class="subscribe-form nav-subscribe-form">

          <button type="submit" class="header__cta">무료 구독하기</button>
        </form>
      </nav>
    </div>
  </header>

  <!-- Subscribe Page Hero -->
  <section class="hero" id="hero">
    <div class="hero__glow hero__glow--1"></div>
    <div class="hero__glow hero__glow--2"></div>

        </p>

    </div>
  </section>

    <div class="stats-bar" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); text-align: center;">
      <div class="stat-item" style="padding: 1.5rem;">
        <div class="stat-item__value" style="font-size: 2rem;">&#128232;</div>
        <div class="stat-item__label" style="margin-top: 12px; font-size: 1rem; color: var(--text-primary);">매일 무료 업데이트</div>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 6px;">매일 아침 새로운 공고를 이메일로</p>
      </div>
      <div class="stat-item" style="padding: 1.5rem;">
        <div class="stat-item__value" style="font-size: 2rem;">&#128270;</div>
        <div class="stat-item__label" style="margin-top: 12px; font-size: 1rem; color: var(--text-primary);">검증된 정보 수집</div>

      </div>
      <div class="stat-item" style="padding: 1.5rem;">
        <div class="stat-item__value" style="font-size: 2rem;">&#128274;</div>
        <div class="stat-item__label" style="margin-top: 12px; font-size: 1rem; color: var(--text-primary);">스팸 메일 제로</div>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 6px;">개인정보를 안전하게 보호</p>
      </div>
    </div>
  </section>

  <!-- Subscription Action Forms -->
  <section class="container" style="margin-bottom: 4rem; display: flex; flex-direction: column; align-items: center; gap: 2rem;">
    <!-- Subscribe Form -->
    <div style="width: 100%; max-width: 320px;">
      <form class="subscribe-form" style="display: flex; flex-direction: column; gap: 0.5rem;">
        <input type="email" class="nav-subscribe-input" placeholder="이메일 주소" required autocomplete="email" style="width: 100%; box-sizing: border-box; font-size: 1rem; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px;">
        <button type="submit" class="header__cta subscribe-dynamic-btn" style="width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; text-align: center; justify-content: center;">무료 구독하기</button>
      </form>
    </div>
    
    <!-- Unsubscribe Form -->
    <div style="width: 100%; max-width: 320px; border-top: 1px solid var(--border-color); padding-top: 2rem;">
      <form class="unsubscribe-form" style="display: flex; flex-direction: column; gap: 0.5rem;">
        <input type="email" class="nav-subscribe-input" placeholder="이메일 주소" required autocomplete="email" style="width: 100%; box-sizing: border-box; font-size: 1rem; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px;">
