<!DOCTYPE html>
<html lang="ko" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <!--[if mso]><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml><![endif]-->
  <style>
    /* Reset */
    body, table, td, p, a, h1, h2, h3 { margin: 0; padding: 0; }
    body { width: 100% !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    
    /* Main styles */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Pretendard', sans-serif;
      background-color: #F8FAFC;
      color: #1E293B;
    }
    
    .email-wrapper { 
      max-width: 600px; 
      margin: 0 auto; 
      background-color: #FFFFFF; 
    }
    
    .header-section {
      background: linear-gradient(135deg, #2563EB, #3B82F6);
      padding: 40px 24px;
      text-align: center;
    }
    
    .posting-wrap {
      padding: 24px;
      background-color: #F8FAFC;
    }

    .posting-item {
      background: #FFFFFF;
      padding: 24px;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .view-link {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 8px;
      color: #2563EB;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    
    .footer-section {
      padding: 32px 24px;
      text-align: center;
      background-color: #FFFFFF;
      border-top: 1px solid #E2E8F0;
      font-size: 12px;
      color: #64748B;
    }
    
    @media only screen and (max-width: 480px) {
      .email-wrapper { width: 100% !important; }
      .posting-wrap { padding: 16px !important; }
      .posting-item { padding: 16px !important; }
      .header-section { padding: 32px 16px !important; }
    }
  </style>
</head>
<body style="background-color: #F8FAFC; margin: 0; padding: 0;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #F8FAFC;">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <!--[if mso]><table role="presentation" border="0" cellspacing="0" cellpadding="0" align="center" width="600"><tr><td><![endif]-->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-wrapper" style="max-width: 600px; background-color: #FFFFFF; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
          
          <!-- Header -->
          <tr>
            <td class="header-section" style="background: #ffffff; padding: 40px 24px 20px 24px; text-align: center;">
              <h1 style="font-size: 26px; font-weight: 800; color: #1E293B; margin: 0 0 16px 0; letter-spacing: -0.5px;">
                매일 아침 배달합니다!
              </h1>
               <div style="text-align: center; margin-top: 8px;">
                 <span style="font-size: 15px; color: #64748B; display: inline-block; vertical-align: middle; margin-right: 12px;">{{ date_display }}</span>
                 <span style="display: inline-block; padding: 4px 12px; background: #F1F5F9; border-radius: 20px; font-size: 13px; color: #475569; font-weight: 600; vertical-align: middle;">오늘 신규 공고: {{ posting_count }}건</span>
              </div>
              <div style="margin-top: 20px; text-align: center;">
                <!-- Home Button -->
                <a href="{{ site_url }}" style="display: inline-flex; align-items: center; padding: 5px 14px; background: #ffffff; color: #475569; text-decoration: none; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid #E2E8F0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); height: 32px; box-sizing: border-box; vertical-align: middle; margin: 0 4px 8px 4px;">🏠 홈</a>
                <!-- Email Input (Pill) -->
                <div style="display: inline-flex; align-items: center; background: #ffffff; border-radius: 20px; padding: 0 14px; border: 1px solid #E2E8F0; height: 32px; box-sizing: border-box; vertical-align: middle; margin: 0 4px 8px 4px;" id="email-input-wrapper">
                  <a href="{{ site_url }}#subscribe" style="font-size: 12px; color: #94A3B8; text-decoration: none;" id="email-label">이메일 주소</a>
                </div>
                <!-- Subscribe Button (Pill) -->
                <a href="{{ site_url }}#subscribe" style="display: inline-flex; align-items: center; padding: 0 16px; background: #18181B; color: #ffffff; text-decoration: none; border-radius: 18px; font-size: 12px; font-weight: 700; height: 32px; box-sizing: border-box; vertical-align: middle; margin: 0 4px 8px 4px;" id="subscribe-btn">무료 구독하기</a>
              </div>
            </td>
          </tr>
          
          <!-- Postings Background Wrap -->
          <tr>
            <td class="posting-wrap" style="padding: 24px; background-color: #F8FAFC;">
              <!-- Container for all postings -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                {{ postings_html }}
              </table>
            </td>
          </tr>
          
          <!-- Website Link -->
          <tr>
            <td style="padding: 32px 24px; text-align: center; background-color: #FFFFFF; border-top: 1px solid #E2E8F0;">
              <a href="{{ site_url }}" style="display: inline-block; padding: 14px 32px; background: #2563EB; color: #ffffff; text-decoration: none; border-radius: 24px; font-size: 15px; font-weight: 600; box-shadow: 0 4px 6px rgba(37,99,235,0.2);">
                모든 공고 웹사이트에서 보기
              </a>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td class="footer-section" style="padding: 32px 24px; text-align: center; background-color: #F1F5F9; font-size: 12px; color: #64748B;">
              <p>&copy; 2026 Albadanji. All rights reserved.</p>
              <p style="margin-top: 8px;">
                이 메일은 알바단지 구독자에게 발송되었습니다.<br>
                더 이상 수신을 원치 않으시면 <a href="{{ unsubscribe_url }}" style="color: #64748B; text-decoration: underline;">수신 거부</a>를 클릭하세요.
              </p>
            </td>
          </tr>
          
        </table>
        <!--[if mso]></td></tr></table><![endif]-->
      </td>
    </tr>
  </table>
  <script>
    // 이 코드는 웹사이트 아카이브에서 볼 때만 실행됩니다.
    (function() {
      if (typeof window !== 'undefined' && window.location.protocol.startsWith('http')) {
        document.addEventListener('DOMContentLoaded', function() {
          const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyamQy2beFZ0_uDA6IEdAqQ5rG5AJ4o70wyiXNh9XegnNXv_4YeiNcT96ebamgl5SW/exec";
          
          const emailLabel = document.getElementById('email-label');
          const subscribeBtn = document.getElementById('subscribe-btn');
          const unsubscribeBtn = document.getElementById('unsubscribe-btn');

          if (emailLabel && subscribeBtn) {
            const input = document.createElement('input');
            input.type = 'email';
            input.placeholder = '이메일 주소';
            input.style.cssText = 'border: none; outline: none; font-size: 12px; width: 120px; background: transparent; color: #1E293B;';
            emailLabel.parentNode.replaceChild(input, emailLabel);

            subscribeBtn.addEventListener('click', function(e) {
              e.preventDefault();
              const email = input.value.trim();
              if (!email) { alert('이메일 주소를 입력해주세요.'); return; }
              
              const originalText = subscribeBtn.textContent;
              subscribeBtn.textContent = '처리 중...';
              subscribeBtn.style.pointerEvents = 'none';
              
              fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'subscribe', email: email })
              }).then(() => {
                alert('✅ 구독 신청이 완료되었습니다!');
                input.value = '';
              }).catch(() => {
                alert('✅ 구독 신청이 완료되었습니다!');
              }).finally(() => {
                subscribeBtn.textContent = originalText;
                subscribeBtn.style.pointerEvents = 'auto';
              });
            });
          }

          if (unsubscribeBtn) {
            unsubscribeBtn.addEventListener('click', function(e) {
              // 아카이브 뷰에서는 UNSUBSCRIBE_LINK가 아닌 경우(즉, placeholder 상태거나 특정 URL이 아닌 경우)에만 prompt 실행
              if (unsubscribeBtn.getAttribute('href').includes('UNSUBSCRIBE_LINK')) {
                e.preventDefault();
                const email = prompt('구독 취소할 이메일 주소를 입력해주세요:');
                if (!email) return;
                
                unsubscribeBtn.textContent = '처리 중...';
                fetch(WEB_APP_URL, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify({ action: 'unsubscribe', email: email })
                }).then(() => {
                  alert('구독이 취소되었습니다.');
                }).catch(() => {
                  alert('구독이 취소되었습니다.');
                }).finally(() => {
                  unsubscribeBtn.textContent = '구독취소';
                });
              }
            });
          }
        });
      }
    })();
  </script>
</body>
</html>
